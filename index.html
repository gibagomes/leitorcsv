<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #081220 0%, #0f1f38 55%, #12345a 100%);
    color: #ffffff;
    line-height: 1.6;
  }

  .container {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .hero {
    padding: 70px 0 50px;
    text-align: center;
  }

  .logo {
    width: 180px;
    max-width: 80%;
    border-radius: 24px;
    margin-bottom: 24px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
  }

  h1, h2, h3 {
    margin-top: 0;
  }

  .hero h1 {
    font-size: 48px;
    line-height: 1.12;
    margin-bottom: 18px;
    color: #ffffff;
  }

  .hero p {
    max-width: 860px;
    margin: 0 auto 14px;
    font-size: 20px;
    color: #d9e2ec;
  }

  .highlight {
    color: #34d399;
    font-weight: 700;
  }

  .btn {
    display: inline-block;
    margin-top: 24px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #ffffff;
    text-decoration: none;
    padding: 16px 34px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 18px;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 12px 30px rgba(34, 197, 94, 0.25);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 36px rgba(34, 197, 94, 0.35);
  }

  .section {
    padding: 34px 0;
  }

  .section-title {
    text-align: center;
    font-size: 34px;
    margin-bottom: 18px;
    color: #ffffff;
  }

  .section-subtitle {
    text-align: center;
    max-width: 860px;
    margin: 0 auto 30px;
    color: #d9e2ec;
    font-size: 18px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .card {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.20);
    backdrop-filter: blur(4px);
  }

  .card h3 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #ffffff;
  }

  .card p {
    margin: 0;
    color: #d9e2ec;
  }

  .list-card {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.12);
    color: #ffffff;
  }

  .problem-box {
    background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(255,255,255,0.05));
    border: 1px solid rgba(239,68,68,0.28);
  }

  .solution-box {
    background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(255,255,255,0.05));
    border: 1px solid rgba(34,197,94,0.28);
  }

  .price-box {
    text-align: center;
    background: linear-gradient(135deg, rgba(34,197,94,0.14), rgba(255,255,255,0.06));
    border: 1px solid rgba(34,197,94,0.28);
    border-radius: 18px;
    padding: 30px 20px;
    max-width: 700px;
    margin: 0 auto;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
  }

  .price {
    font-size: 50px;
    font-weight: 800;
    color: #34d399;
    margin: 10px 0;
  }

  .small {
    color: #d9e2ec;
    font-size: 15px;
  }

  .cta-final {
    text-align: center;
    padding-bottom: 70px;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 18px;
  }

  .badge {
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.10);
    font-size: 14px;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.12);
  }

  @media (max-width: 900px) {
    .grid-2, .grid-3 {
      grid-template-columns: 1fr;
    }

    .hero h1 {
      font-size: 34px;
    }

    .section-title {
      font-size: 28px;
    }

    .price {
      font-size: 40px;
    }

    .hero p,
    .section-subtitle {
      font-size: 17px;
    }
  }
</style>
